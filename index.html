<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Achievr To-Do List App</title>
  Shriyali Pansare

  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Your External CSS -->
  <link rel="stylesheet" href="style.css">
 <link rel="shortcut icon" href="icons8-star-filled-100.png" type="image/x-icon">
 
</head>
<body>
  <div class="container">
    <div class="todo-app">
      <h1>To-Do App</h1>

      <div class="input-area">
        <input type="text" id="task-input" placeholder="Add a New Task..." />
        <button type="button" id="add-task-btn"><i class="fa-solid fa-plus"></i></button>
      </div>

      <div class="todos-container">
        <ul id="task-list"></ul>
        <img src="https://cdn4.iconfinder.com/data/icons/office-vol-1-11/16/clipboard-empty-list-shipping-512.png" alt="empty" class="empty-image" />
      </div>
    </div>
  </div>

  <script src="script.js"></script>
 
</body>


</html>
